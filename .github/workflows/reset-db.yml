name: Nightly DB Reset

on:
  schedule:
    - cron: '0 4 * * *'

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up backend
        run: |
          curl https://capstone-sevv.onrender.com/
          sleep 30
      - name: Reset database
        run: |
          curl -X POST https://capstone-sevv.onrender.com/admin/reset \
            -H "x-reset-secret: ${{ secrets.RESET_SECRET }}"
